version: '3.8'

networks:
  alb-network:
    driver: bridge

services:

  eureka-server:
    cpus: "0.5"
    mem_limit: 256m
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    environment:
      - EUREKA_HOSTNAME=eureka-server
    ports:
      - "8761:8761"
    networks:
      - alb-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─── Instance MẠNH — Server chính, xử lý tải cao ──────
  registration-8081:
    cpus: "2.0"
    mem_limit: 768m
    build:
      context: .
      dockerfile: registration-service-alb/Dockerfile
    container_name: registration-8081
    environment:
      - PORT=8081
      - EUREKA_URL=http://eureka-server:8761/eureka/
    ports:
      - "8081:8081"
    networks:
      - alb-network
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: on-failure

  # ─── Instance TRUNG BÌNH — Server phụ ─────────────────
  registration-8082:
    cpus: "1.5"
    mem_limit: 512m
    build:
      context: .
      dockerfile: registration-service-alb/Dockerfile
    container_name: registration-8082
    environment:
      - PORT=8082
      - EUREKA_URL=http://eureka-server:8761/eureka/
    ports:
      - "8082:8082"
    networks:
      - alb-network
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: on-failure

  # ─── Instance YẾU — Server hạn chế tài nguyên ─────────
  registration-8083:
    cpus: "1.0"
    mem_limit: 384m
    build:
      context: .
      dockerfile: registration-service-alb/Dockerfile
    container_name: registration-8083
    environment:
      - PORT=8083
      - EUREKA_URL=http://eureka-server:8761/eureka/
    ports:
      - "8083:8083"
    networks:
      - alb-network
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: on-failure

  # ─── API Gateway — Cần nhiều tài nguyên nhất ──────────
  api-gateway-alb:
    cpus: "2.0"
    mem_limit: 1g
    build:
      context: .
      dockerfile: api-gateway-alb/Dockerfile
    container_name: api-gateway-alb
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    networks:
      - alb-network
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: on-failure
server:
    port: 8080

spring:
    application:
        name: api-gateway-alb
    cloud:
        gateway:
            httpclient:
                connect-timeout: 2000
                response-timeout: 15s
                pool:
                    type: elastic
                    max-connections: 1000
            metrics:
              enabled: true
        loadbalancer:
            cache:
                ttl: 5s

alb:
    # adaptive, round-robin, random, least-connections
    strategy: adaptive
    polling:
        interval: 200

    ewma:
        # tau-min nhỏ hơn: phản ứng nhanh khi spike (chaos event hoặc overload)
        # tau-max nhỏ hơn: ổn định hơn nhưng không quá trơ
        # k=4.0: rất nhạy với deviation (deviation 25% đã đủ để giảm τ về τ_min)
        tau-min: 200.0 
        tau-max: 2000.0 # 3000 → 2000ms (ổn định hơn, phản ứng nhanh hơn)
        k: 3.0 

    pid:
        # kp cao hơn: phản ứng P mạnh hơn khi một node chậm hơn system P75
        # ki thấp hơn: tránh integral windup khi node nhanh trở lại sau overload
        # lambda nhỏ hơn: PID penalty không lấn át MCDM baseScore quá nhiều
        #   (baseScore đã cải thiện nhờ system-wide normalization)
        kp: 1.0 
        ki: 0.08 
        kd: 0.04 
        tau-d: 2.0
        min-i: -0.8 
        max-i: 2.5 
        lambda: 0.8 
        kappa: 1.2 

    weights:
        update-interval: 5000

    routing:
        warmup-ms: 5000
        min-expected-inflight: 3.0
        low-load-inflight: 20
        low-load-health-spread: 0.12
        low-load-load-spread: 0.25
        min-health-weight: 0.35
        max-health-weight: 0.80
        stale-penalty-weight: 0.30
        stale-soft-ms: 800
        stale-hard-ms: 2000
        unhealthy-score-cutoff: 2.0
        hard-inflight-cap: 180
        probe-interval-ms: 2000
        probe-probability: 0.02

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[spring.cloud.gateway.requests]": true
      slo:
        "[http.server.requests]":
          - 50ms
          - 100ms
          - 150ms
          - 200ms
          - 300ms
          - 500ms
          - 750ms
          - 1s
          - 2s
          - 3s
          - 5s
          - 10s
        "[spring.cloud.gateway.requests]":
          - 50ms
          - 100ms
          - 150ms
          - 200ms
          - 300ms
          - 500ms
          - 750ms
          - 1s
          - 2s
          - 3s
          - 5s
          - 10s
eureka:
    client:
        serviceUrl:
            defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
        registry-fetch-interval-seconds: 5
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 10

server:
    port: 8080

spring:
    application:
        name: api-gateway-alb
    cloud:
        gateway:
            httpclient:
                connect-timeout: 2000
                response-timeout: 15s
                pool:
                    type: elastic
                    max-connections: 1000
            metrics:
              enabled: true
        loadbalancer:
            cache:
                ttl: 5s

alb:
    # adaptive, round-robin, random, least-connections
    strategy: round-robin
    polling:
        interval: 200

    ewma:
        # tau-min nhá» hÆ¡n: pháº£n á»©ng nhanh khi spike (chaos event hoáº·c overload)
        # tau-max nhá» hÆ¡n: á»•n Ä‘á»‹nh hÆ¡n nhÆ°ng khÃ´ng quÃ¡ trÆ¡
        # k=4.0: ráº¥t nháº¡y vá»›i deviation (deviation 25% Ä‘Ã£ Ä‘á»§ Ä‘á»ƒ giáº£m Ï„ vá» Ï„_min)
        tau-min: 200.0 
        tau-max: 2000.0 # 3000 â†’ 2000ms (á»•n Ä‘á»‹nh hÆ¡n, pháº£n á»©ng nhanh hÆ¡n)
        k: 3.0 

    pid:
        # kp cao hÆ¡n: pháº£n á»©ng P máº¡nh hÆ¡n khi má»™t node cháº­m hÆ¡n system P75
        # ki tháº¥p hÆ¡n: trÃ¡nh integral windup khi node nhanh trá»Ÿ láº¡i sau overload
        # lambda nhá» hÆ¡n: PID penalty khÃ´ng láº¥n Ã¡t MCDM baseScore quÃ¡ nhiá»u
        #   (baseScore Ä‘Ã£ cáº£i thiá»‡n nhá» system-wide normalization)
        kp: 1.0 
        ki: 0.08 
        kd: 0.04 
        tau-d: 2.0
        min-i: -0.8 
        max-i: 2.5 
        lambda: 0.8 
        kappa: 1.2 

    weights:
        update-interval: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[spring.cloud.gateway.requests]": true
      slo:
        "[http.server.requests]":
          - 50ms
          - 100ms
          - 150ms
          - 200ms
          - 300ms
          - 500ms
          - 750ms
          - 1s
          - 2s
          - 3s
          - 5s
          - 10s
        "[spring.cloud.gateway.requests]":
          - 50ms
          - 100ms
          - 150ms
          - 200ms
          - 300ms
          - 500ms
          - 750ms
          - 1s
          - 2s
          - 3s
          - 5s
          - 10s
eureka:
    client:
        serviceUrl:
            defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
        registry-fetch-interval-seconds: 5
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 10

server:
  port: 8080

spring:
  application:
    name: api-gateway-alb
  cloud:
    gateway:
      httpclient:
        #  Giới hạn thời gian chờ (Fail-Fast Mechanism)
        connect-timeout: 2000 # 2 giây để thiết lập kết nối TCP
        response-timeout: 15s  # Tối đa 15 giây để chờ backend trả lời
        pool:
          type: elastic
          max-connections: 1000 # Mở rộng sức chứa connection pool cho tải cao
    loadbalancer:
      cache:
        # Làm mới danh sách máy chủ nhanh hơn
        ttl: 5s # Thời gian sống của cache (mặc định 35s)

alb:
  # adaptive, round-robin, random, least-connections
  strategy: adaptive
  polling:
    interval: 500    # Tăng từ 500ms → 1000ms, giảm overhead polling
  ewma:
    tau-min: 300.0    # Phản ứng nhanh hơn với chaos
    tau-max: 8000.0   # Làm mịn mạnh hơn khi ổn định
    k: 3.0            # Nhạy hơn với biến động


management:
  endpoints:
    web:
      exposure:
        #  Bảo mật (Nguyên tắc Least Privilege)
        include: health, info, metrics, prometheus 
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    #  Tăng tốc độ đồng bộ Service Discovery
    registry-fetch-interval-seconds: 5 # Mặc định 30s
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10 # Gửi (Heartbeat) nhanh hơn
server:
    port: 8080

spring:
    application:
        name: api-gateway-alb
    cloud:
        gateway:
            httpclient:
                connect-timeout: 2000
                response-timeout: 15s
                pool:
                    type: elastic
                    max-connections: 1000
            metrics:
              enabled: true
        loadbalancer:
            cache:
                ttl: 5s

alb:
    # adaptive, round-robin, random, least-connections
    # Có thể override khi chạy Docker bằng biến môi trường ALB_STRATEGY.
    strategy: least-connections

    # Phục vụ ablation study cho Adaptive. Giá trị mặc định full để benchmark chính không bị nhiễm.
    # full, no-pid, fixed-weights, no-ewma-latency, no-score-ema, no-capacity, no-p2c, no-probe, no-low-load-rr
    ablation:
        variant: full
    polling:
        interval: 200
        metrics-timeout-ms: 800
        score-ema-alpha-spike: 0.60
        score-ema-alpha-rise: 0.35
        score-ema-alpha-recover: 0.25
        score-ema-spike-threshold: 0.30
        idle-latency-baseline-ms: 65.0
        idle-decay-alpha: 0.20

    ewma:
        # tau-min nhỏ hơn: phản ứng nhanh khi spike (chaos event hoặc overload)
        # tau-max nhỏ hơn: ổn định hơn nhưng không quá trơ
        # k=4.0: rất nhạy với deviation (deviation 25% đã đủ để giảm τ về τ_min)
        tau-min: 200.0 
        tau-max: 2000.0 # 3000 → 2000ms (ổn định hơn, phản ứng nhanh hơn)
        k: 3.0 

    pid:
        # kp cao hơn: phản ứng P mạnh hơn khi một node chậm hơn system P75
        # ki thấp hơn: tránh integral windup khi node nhanh trở lại sau overload
        # lambda nhỏ hơn: PID penalty không lấn át MCDM baseScore quá nhiều
        #   (baseScore đã cải thiện nhờ system-wide normalization)
        kp: 1.0 
        ki: 0.08 
        kd: 0.04 
        tau-d: 2.0
        min-i: -0.8 
        max-i: 2.5 
        lambda: 0.8 
        kappa: 1.2 

    weights:
        update-interval: 5000
        # Dynamic MCDM chỉ học trọng số khi có traffic nghiệp vụ thật.
        # Khi idle, giữ/reset về AHP để tránh EWM hội tụ theo nhiễu nền do metrics polling.
        min-completed-requests: 20
        min-actual-rps: 5.0
        reset-to-ahp-when-idle: true
        # Các tham số dưới đây giữ nguyên hành vi hiện tại nhưng được đưa ra config
        # để sensitivity analysis không cần sửa code.
        blend-factor: 0.70
        ema-alpha-min: 0.08
        ema-alpha-max: 0.22
        stable-queue-threshold: 0.08
        stable-cpu-threshold: 0.08
        stable-latency-spread: 0.12
        alpha-min: 0.15
        alpha-max: 0.70
        beta-min: 0.08
        beta-max: 0.45
        gamma-min: 0.08
        gamma-max: 0.35

    routing:
        warmup-ms: 5000
        min-expected-inflight: 3.0
        low-load-inflight: 20
        low-load-health-spread: 0.12
        low-load-load-spread: 0.25
        min-health-weight: 0.25
        max-health-weight: 0.75
        stale-penalty-weight: 0.15
        stale-soft-ms: 1500
        stale-hard-ms: 5000
        unhealthy-score-cutoff: 2.0
        hard-inflight-cap: 220
        probe-interval-ms: 3000
        probe-probability: 0.005
        # RoutingCostCalculator tuning parameters.
        min-routing-norm-range: 0.12
        routing-weight-ema-alpha: 0.18
        dominant-threshold: 0.70
        overload-penalty-weight: 0.30
        cap-pressure-penalty-weight: 0.20
        absolute-health-penalty-weight: 0.12
        # Absolute latency signal: không để toàn cụm cùng chậm bị che bởi min-max tương đối.
        absolute-latency-penalty-weight: 0.12
        absolute-latency-target-ms: 300.0
        absolute-latency-critical-ms: 1500.0
        overload-start-ratio: 0.95
        overload-full-ratio: 1.40
        cap-pressure-start-ratio: 0.70
        cap-pressure-full-ratio: 1.00
        absolute-health-start: 0.75
        absolute-health-full: 1.50
        hard-inflight-cap-min: 40
        capacity-cap-factor-min: 0.70
        capacity-cap-factor-max: 1.50
        # Probe recovery chỉ chạy khi cụm chưa căng để không làm xấu p99.
        probe-max-total-inflight-ratio: 0.70
        probe-max-load-raw: 1.10
        probe-max-absolute-latency-cost: 0.80
        probe-max-final-cost: 1.50

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[spring.cloud.gateway.requests]": true
      slo:
        "[http.server.requests]":
          - 50ms
          - 100ms
          - 150ms
          - 200ms
          - 300ms
          - 500ms
          - 750ms
          - 1s
          - 2s
          - 3s
          - 5s
          - 10s
        "[spring.cloud.gateway.requests]":
          - 50ms
          - 100ms
          - 150ms
          - 200ms
          - 300ms
          - 500ms
          - 750ms
          - 1s
          - 2s
          - 3s
          - 5s
          - 10s
eureka:
    client:
        serviceUrl:
            defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
        registry-fetch-interval-seconds: 5
        healthcheck:
            enabled: true
    instance:
        instance-id: ${spring.application.name}:${server.port}
        hostname: api-gateway-alb
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 5
        lease-expiration-duration-in-seconds: 15

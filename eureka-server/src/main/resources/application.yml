server:
  port: 8761 # Port mặc định tiêu chuẩn của Eureka

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}    # ← thêm biến env
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/